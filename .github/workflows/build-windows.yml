name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build executable
        working-directory: app
        run: |
          pyinstaller --noconsole --onefile --runtime-tmpdir .courier_runtime --name CourierScanManager app.py

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 app\dist\CourierScanManager.exe).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath app\dist\CourierScanManager.sha256.txt -Encoding utf8
          Write-Host "SHA256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CourierScanManager-windows
          path: |
            app/dist/CourierScanManager.exe
            app/dist/CourierScanManager.sha256.txt
